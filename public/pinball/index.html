<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>DATA CRAWLER: PINBALL</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #020202;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; overflow: hidden; font-family: monospace;
      touch-action: none; -webkit-touch-callout: none; user-select: none;
    }
    #c { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c = document.getElementById('c');
const g = c.getContext('2d', { alpha: false });
const dpr = window.devicePixelRatio || 1;

let logicalW = 480, logicalH = 720, logicalScale = 1;
const W = 480, H = 720; 

function resize() {
  const aspectWin = window.innerWidth / window.innerHeight;
  const aspectGame = W / H;
  if (aspectWin > aspectGame) {
    logicalH = H; logicalW = H * aspectWin; logicalScale = window.innerHeight / H;
  } else {
    logicalW = W; logicalH = W / aspectWin; logicalScale = window.innerWidth / W;
  }
  c.width = window.innerWidth * dpr; c.height = window.innerHeight * dpr;
  c.style.width = window.innerWidth + 'px'; c.style.height = window.innerHeight + 'px';
}
window.addEventListener('resize', resize);
resize();

const bgC = document.createElement('canvas');
bgC.width = W * dpr; bgC.height = H * dpr;
const bgG = bgC.getContext('2d', { alpha: false });
bgG.setTransform(dpr, 0, 0, dpr, 0, 0);

bgG.fillStyle = '#08080a'; bgG.fillRect(0, 0, W, H);
for (let gy = 20; gy < H; gy += 40) {
  for (let gx = 20; gx < W; gx += 40) {
    bgG.fillStyle = '#18181A'; bgG.fillRect(gx-1, gy-1, 2, 2);
  }
}
bgG.strokeStyle = '#222225'; bgG.lineWidth = 2; bgG.strokeRect(10, 10, W-20, H-20);
bgG.strokeStyle = '#111115'; bgG.lineWidth = 1; bgG.strokeRect(4, 4, W-8, H-8);

const GRAVITY = 0.38, RESTITUTION = 0.55, BR = 11, BUMPER_BOOST = 1.15, MAX_SPEED = 22, SUBSTEPS = 6;
const FLIP_LEN = 131, FLIP_PY = H - 92, FLIP_PXL = 95, FLIP_PXR = W - 95;
const FLIP_REST_L = 0.45, FLIP_ACT_L = -0.50, FLIP_REST_R = Math.PI - 0.45, FLIP_ACT_R = Math.PI + 0.50;

let phase = 'start', score = 0, lives = 3, pulseT = 0;
let level = 1;

const imgGadas = new Image();
imgGadas.src = 'gadas.png';
const imgGadas2 = new Image();
imgGadas2.src = 'gadas2.png';

let ball = { x: W/2, y: 70, vx: 0, vy: 1, dmg: 10, trail: [] };
let parts = [], pops = [], ripples = [];
let screenShake = 0, combo = 0, rageMode = false;

// VOXEL STRUCTURES
let bumpers = [];
let ceilingVoxels = [];
const VOXEL_SIZE = 2; // Ultra-fine micro pixel resolution

const flippers = [
  { px: FLIP_PXL, py: FLIP_PY, len: FLIP_LEN, restAngle: FLIP_REST_L, activeAngle: FLIP_ACT_L, angle: FLIP_REST_L, angVel: 0, active: 0, hit: 0 },
  { px: FLIP_PXR, py: FLIP_PY, len: FLIP_LEN, restAngle: FLIP_REST_R, activeAngle: FLIP_ACT_R, angle: FLIP_REST_R, angVel: 0, active: 0, hit: 0 }
];
const guides = [ [0, H-220, FLIP_PXL, FLIP_PY], [W, H-190, FLIP_PXR, FLIP_PY] ];

function mkBall() { 
  ball.x = 240 + (Math.random()-0.5)*50; ball.y = 80; 
  ball.vx = (Math.random()-0.5)*2; ball.vy = 1; 
  ball.trail = [];
  combo = 0; rageMode = false;
}

function popup(x,y,txt) { pops.push({x,y,txt,life:1}); }

function initFloor() {
  bumpers = [];
  ceilingVoxels = [];
  
  // Build Ceiling
  const ceilThickness = 24 + level * 6; // Ceiling gets thicker
  for(let x=10; x<W-10; x+=VOXEL_SIZE) {
    for(let y=10; y<ceilThickness; y+=VOXEL_SIZE) {
      ceilingVoxels.push({ rx: x, ry: y });
    }
  }

  const amt = level === 1 ? 6 : 5 + Math.floor(Math.random()*4);
  const hpBase = 20 * level;
  
  const baseLayout = [
    { x: 340, y: 160, r: 28 }, { x: 410, y: 240, r: 28 }, { x: 260, y: 280, r: 35 },
    { x: 120, y: 320, r: 22 }, { x: 360, y: 440, r: 22 }, { x: 110, y: 460, r: 28 }
  ];

  for(let i=0; i<amt; i++) {
    let bx, by, br;
    if (level === 1 && i < baseLayout.length) {
      bx = baseLayout[i].x; by = baseLayout[i].y; br = baseLayout[i].r;
    } else {
      bx = 80 + Math.random()*(W-160);
      by = 120 + Math.random()*(H-300);
      br = 20 + Math.random()*20;
    }
    bumpers.push({
        x: bx, y: by, r: br,
        pts: 100 * level,
        f: 0
    });
  }

  // Assign the special Gadas image to exactly one bumper!
  if (bumpers.length > 0) {
      // Find the biggest bumper or just randomly assign it
      let bossBumper = bumpers[Math.floor(Math.random() * bumpers.length)];
      bossBumper.img = imgGadas;
      bossBumper.pts *= 5; // 5x Points modifier
      bossBumper.r = Math.max(bossBumper.r, 35); // Force it to be big enough to read the face clearly
  }
}
initFloor();

let actx = null;
function playSound(type, freq, dr, vol, endFreq) {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
  const t = actx.currentTime;
  const osc = actx.createOscillator();
  const gain = actx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  if (endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, t + dr);
  gain.gain.setValueAtTime(vol * 0.4, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dr);
  osc.connect(gain); gain.connect(actx.destination);
  osc.start(t); osc.stop(t + dr);
}

function pressSide() {
  initAudio();
  if (phase === 'dead') {
    mkBall(); phase = 'play'; return;
  }
  if (phase === 'start' || phase === 'over') { 
    score=0; lives=3; level=1; ball.dmg=15; 
    initFloor(); mkBall(); phase='play'; return; 
  }
  if(!flippers[0].active || !flippers[1].active) playSound('square', 150, 0.1, 0.05);
  flippers[0].active = 1; flippers[1].active = 1;
}
function releaseSide() { flippers[0].active = 0; flippers[1].active = 0; }
function initAudio() { if(!actx) playSound('sine',0,0,0); }

window.addEventListener('mousedown', e => { pressSide(); });
window.addEventListener('mouseup', e => { releaseSide(); });
window.addEventListener('touchstart', e => { e.preventDefault(); pressSide(); }, {passive: false});
window.addEventListener('touchend', e => { e.preventDefault(); if (e.touches.length === 0) releaseSide(); }, {passive: false});
window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if(k==='z'||e.key==='Shift') { if(!flippers[0].active) playSound('square',140,0.1,0.05); flippers[0].active=1; }
  if(k==='m'||e.key==='Shift') { if(!flippers[1].active) playSound('square',160,0.1,0.05); flippers[1].active=1; }
  if(phase === 'dead' && (k===' '||k==='enter')) { mkBall(); phase='play'; playSound('sine', 440, 0.2, 0.1); }
  else if((phase === 'start' || phase === 'over') && (k===' '||k==='enter')) { score=0; lives=3; level=1; ball.dmg=15; initFloor(); mkBall(); phase='play'; playSound('sine', 440, 0.2, 0.1); }
});
window.addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  if(k==='z'||e.key==='Shift') flippers[0].active=0;
  if(k==='m'||e.key==='Shift') flippers[1].active=0;
});

const clamp = (v, l, h) => Math.max(l, Math.min(v, h));
function closestSeg(cx,cy, ax,ay, bx,by) {
  const dx = bx-ax, dy = by-ay;
  const t = clamp(((cx-ax)*dx+(cy-ay)*dy)/(dx*dx+dy*dy), 0, 1);
  const ex = (ax+t*dx)-cx, ey = (ay+t*dy)-cy;
  const dist = Math.hypot(ex, ey);
  return { dist, t, nx: dist>0?-ex/dist:0, ny: dist>0?-ey/dist:0 };
}
function reflect(vx, vy, nx, ny, e=RESTITUTION) {
  const dot = vx*nx+vy*ny; return { vx: (vx-2*dot*nx)*e, vy: (vy-2*dot*ny)*e };
}

function nextFloor() {
    level++;
    ball.dmg += 5;
    score += 5000 * level;
    playSound('square', 600, 0.5, 0.4, 1200); 
    popup(W/2, 100, "FLOOR " + level + " CLEARED!");
    initFloor();
    mkBall();
}

// Applies Voxel Damage (Rips pixels out of the array)
function ripVoxels(voxelArray, cx, cy, impactX, impactY, dmgAmount, bvx, bvy, color) {
    // Add random noise to distance so destruction leaves jagged, organic hole shapes!
    let sorted = voxelArray.map((p, i) => ({
        p, i, dist: Math.hypot((cx+p.rx)-impactX, (cy+p.ry)-impactY) * (0.7 + Math.random()*0.6)
    })).sort((a,b)=>a.dist-b.dist);
    
    let toRemove = [];
    let count = Math.min(dmgAmount, sorted.length);
    for(let k=0; k<count; k++) {
        let p = sorted[k].p;
        let px = cx + p.rx, py = cy + p.ry;
        
        // Spawn only ~15% of the particles visually to keep the screen ultra-clean
        if (Math.random() > 0.85) {
            parts.push({
                x: px, y: py,
                vx: bvx*0.3 + (Math.random()-0.5)*5,
                vy: bvy*0.3 + (Math.random()-0.5)*5,
                life: 0.3 + Math.random()*0.2, color: color, size: VOXEL_SIZE
            });
        }
        toRemove.push(sorted[k].i);
    }
    toRemove.sort((a,b)=>b-a).forEach(i => voxelArray.splice(i, 1));
    return count;
}

function update() {
  if (phase !== 'play') return;
  for (const f of flippers) f.angVel = ((f.active?f.activeAngle:f.restAngle) - f.angle) * (f.active?0.4:0.25);

  if (combo > 0) {
      ball.trail.unshift({x:ball.x, y:ball.y});
      if(ball.trail.length > 3) {
          let tip = ball.trail.pop();
          if (Math.random() > 0.6) {
              for(let i=0; i<2; i++) {
                  parts.push({
                      x: tip.x + (Math.random()-0.5)*BR, y: tip.y + (Math.random()-0.5)*BR,
                      vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2,
                      life: 0.3 + Math.random()*0.3,
                      color: rageMode ? '#ffffff' : '#666666',
                      size: VOXEL_SIZE*(1+Math.random()), burn: true
                  });
              }
          }
      }
  } else if (ball.trail.length > 0) {
      ball.trail.pop();
  }

  if (ball.y < -BR - 2) { nextFloor(); return; }

  for(let s=0; s<SUBSTEPS; s++) {
    for (const f of flippers) f.angle = clamp(f.angle + f.angVel/SUBSTEPS, Math.min(f.restAngle, f.activeAngle), Math.max(f.restAngle, f.activeAngle));
    ball.vy += GRAVITY/SUBSTEPS; ball.x += ball.vx/SUBSTEPS; ball.y += ball.vy/SUBSTEPS;

    // Walls
    if(ball.x - BR < 0) { 
        ball.x=BR; ball.vx=Math.abs(ball.vx)*RESTITUTION; 
        ripples.push({x: BR, y: ball.y, r: BR, color: '#888888', life: 0.4}); 
        playSound('triangle', 300, 0.05, 0.1); 
    }
    if(ball.x + BR > W) { 
        ball.x=W-BR; ball.vx=-Math.abs(ball.vx)*RESTITUTION; 
        ripples.push({x: W-BR, y: ball.y, r: BR, color: '#888888', life: 0.4}); 
        playSound('triangle', 300, 0.05, 0.1); 
    }
    
    // Breakable Ceiling!
    let voxelsNearCeiling = ceilingVoxels.filter(p => Math.abs(p.rx - ball.x) < BR*2 && Math.abs(p.ry - ball.y) < BR*2);
    if(ball.y - BR < 24 && voxelsNearCeiling.length > 0) { 
        ball.y=BR + 24; ball.vy=Math.abs(ball.vy)*RESTITUTION;
        let activeDmg = rageMode ? ball.dmg * 2 : ball.dmg;
        let ripped = ripVoxels(ceilingVoxels, 0, 0, ball.x, ball.y, Math.floor(activeDmg * 3), ball.vx, Math.abs(ball.vy), '#ffffff');
        
        if (ripped > 0) {
            screenShake = Math.max(screenShake, rageMode ? 10 : 5);
            playSound('sawtooth', 600, 0.1, 0.2, 100);
            setTimeout(() => playSound('square', 300, 0.05, 0.1, 50), 30);
        } else {
            playSound('triangle', 200, 0.05, 0.1);
        }
    }

    // Flippers
    for(const f of flippers) {
      const tx = f.px+f.len*Math.cos(f.angle), ty = f.py+f.len*Math.sin(f.angle);
      const d = closestSeg(ball.x, ball.y, f.px, f.py, tx, ty);
      if(d.dist>=BR||d.dist<=0.01) continue;
      let nx = Math.sin(f.angle), ny = -Math.cos(f.angle);
      if(ny>0){nx=-nx;ny=-ny;}
      if(d.nx*nx+d.ny*ny < 0) continue;
      ball.x += nx*(BR-d.dist+1); ball.y += ny*(BR-d.dist+1);
      const wVx = -Math.sin(f.angle)*f.angVel*(d.t*f.len), wVy = Math.cos(f.angle)*f.angVel*(d.t*f.len);
      const relN = (ball.vx-wVx)*nx + (ball.vy-wVy)*ny;
      if(relN >= 0) continue;
      ball.vx -= (1+RESTITUTION)*relN*nx; ball.vy -= (1+RESTITUTION)*relN*ny;
      const spd = Math.hypot(ball.vx, ball.vy);
      if(spd > MAX_SPEED) { ball.vx=ball.vx/spd*MAX_SPEED; ball.vy=ball.vy/spd*MAX_SPEED; }
      if(Math.abs(relN)>2) { 
          f.hit = 1; playSound('square', 200, 0.08, 0.15); 
          combo = 0; rageMode = false;
      }
    }

    // Guides
    for(const [ax,ay,bx,by] of guides) {
      const d = closestSeg(ball.x, ball.y, ax,ay, bx,by);
      if(d.dist<BR&&d.dist>0) {
        const r = reflect(ball.vx, ball.vy, d.nx, d.ny);
        ball.vx=r.vx; ball.vy=r.vy;
        ball.x += d.nx*(BR-d.dist+1); ball.y += d.ny*(BR-d.dist+1);
        playSound('triangle', 250, 0.05, 0.1);
      }
    }

    // Indestructible Bumpers
    for(let i = bumpers.length - 1; i >= 0; i--) {
      const b = bumpers[i];
      const dx=ball.x-b.x, dy=ball.y-b.y, dist=Math.hypot(dx,dy), minD = BR+b.r;
      if(dist<minD && dist>0) {
        const nx=dx/dist, ny=dy/dist, dot=ball.vx*nx+ball.vy*ny;
        ball.vx=(ball.vx-2*dot*nx)*BUMPER_BOOST; ball.vy=(ball.vy-2*dot*ny)*BUMPER_BOOST;
        ball.x = b.x+nx*(minD+1); ball.y = b.y+ny*(minD+1);
        
        b.f = 12; 
        
        // Toggle Custom Image on Hit
        if (b.img === imgGadas) {
            b.img = imgGadas2;
        } else if (b.img === imgGadas2) {
            b.img = imgGadas;
        }
        
        combo++;
        if(combo === 5) { 
            rageMode = true; 
            popup(ball.x, ball.y-30, "RAGE MODE!"); 
            playSound('square', 300, 0.6, 0.4, 1600);
            setTimeout(() => playSound('sawtooth', 400, 0.5, 0.4, 1800), 40);
        } else {
            playSound('sine', 500 + (combo * 150), 0.15, 0.3);
        }
        let mult = rageMode ? 2 : 1;
        score += b.pts * mult;
        
        popup(b.x, b.y-b.r-10, '+'+(b.pts*mult) + (combo>1 ? ' x'+combo : '')); 
        ripples.push({x: b.x, y: b.y, r: b.r, color: rageMode ? '#ffffff' : '#aaaaaa', life: 0.6});
        screenShake = Math.max(screenShake, rageMode ? 4 : 2);
        
        const spd = Math.hypot(ball.vx, ball.vy);
        if(spd > MAX_SPEED) { ball.vx=ball.vx/spd*MAX_SPEED; ball.vy=ball.vy/spd*MAX_SPEED; }
      }
    }
  }

  for(const b of bumpers) if(b.f>0) b.f -= 1;
  for(const f of flippers) if(f.hit>0) f.hit-=0.1;

  if(ball.y > H+50) { 
      lives--; phase = lives>0?'dead':'over'; 
      ripples.push({x: ball.x, y: H-10, r: BR*2, color: '#ffffff', life: 0.8}); 
      playSound('sine', 120, 0.25, 0.6, 60); 
  }
  
  // Ripples physics
  for (let i = ripples.length - 1; i >= 0; i--) {
      let r = ripples[i];
      r.r += 2.5;
      r.life -= 0.06;
      if (r.life <= 0) ripples.splice(i, 1);
  }

  // Particles physics
  parts = parts.filter(p=>p.life>0); 
  for(const p of parts) { 
      p.x+=p.vx; p.y+=p.vy; 
      if (p.spark) {
          p.vx *= 0.85; p.vy *= 0.85; // Friction for sparks
      } else if (p.burn) {
          p.vx *= 0.95; p.vy *= 0.95; // Drift like loose fire embers/smoke
      } else {
          p.vy+=0.15; // Gravity on voxel debris!
      }
      p.life-=0.02; 
  }
  pops = pops.filter(p=>p.life>0); for(const p of pops) { p.y-=1; p.life-=0.03; }
}

function draw() {
  g.setTransform(logicalScale * dpr, 0, 0, logicalScale * dpr, 0, 0);
  g.fillStyle = '#020202'; g.fillRect(0, 0, logicalW, logicalH);

  let offsetX = Math.max(0, (logicalW - W) / 2);
  let offsetY = Math.max(0, (logicalH - H) / 2);

  if(screenShake > 0) {
      offsetX += (Math.random()-0.5)*screenShake;
      offsetY += (Math.random()-0.5)*screenShake;
      screenShake *= 0.85;
      if(screenShake < 0.5) screenShake = 0;
  }

  g.save();
  g.translate(offsetX, offsetY);
  
  g.drawImage(bgC, 0, 0, W, H);
  
  // 📐 Blueprint Architecture Static Grid 📐
  // Pure minimalist classic aesthetic
  g.lineWidth = 1;
  g.strokeStyle = '#0a0a0d'; // Extremely dark grey
  g.beginPath();
  for(let x=0; x<=W; x+=40) { g.moveTo(x, 0); g.lineTo(x, H); }
  for(let y=0; y<=H; y+=40) { g.moveTo(0, y); g.lineTo(W, y); }
  g.stroke();
  
  // Center playfield Crosshairs
  g.strokeStyle = '#111115';
  g.beginPath();
  g.moveTo(W/2 - 40, H/2); g.lineTo(W/2 + 40, H/2);
  g.moveTo(W/2, H/2 - 40); g.lineTo(W/2, H/2 + 40);
  g.arc(W/2, H/2, 20, 0, 7);
  g.stroke();


  // Draw Ceiling Voxels
  g.fillStyle = '#888888';
  for(const p of ceilingVoxels) {
      g.fillRect(p.rx - VOXEL_SIZE/2, p.ry - VOXEL_SIZE/2, VOXEL_SIZE-1, VOXEL_SIZE-1);
  }

  g.lineWidth = 4; g.lineCap = 'round';
  for(const [ax,ay,bx,by] of guides) {
    g.strokeStyle = '#555555'; g.beginPath(); g.moveTo(ax,ay); g.lineTo(bx,by); g.stroke();
    g.strokeStyle = '#222'; g.lineWidth = 1; g.stroke(); g.lineWidth = 4;
  }

  function drawOctagon(x,y,r) {
    g.beginPath();
    for(let i=0; i<8; i++) {
      const a = (i/8)*Math.PI*2 + Math.PI/8;
      g[i?'lineTo':'moveTo'](x + Math.cos(a)*r, y + Math.sin(a)*r);
    }
    g.closePath();
  }

  // Draw Vector Bumpers
  g.lineWidth = 2;
  for(const b of bumpers) {
    const lit = b.f>0;
    if (lit) { g.shadowBlur = 10; g.shadowColor = '#ffffff'; }
    drawOctagon(b.x, b.y, b.r);

    if (b.img && b.img.complete && b.img.width > 0) {
        g.save();
        g.clip();
        g.drawImage(b.img, b.x - b.r, b.y - b.r, b.r*2, b.r*2);
        g.restore();
        
        // Darken the image slightly if the bumper hasn't been hit this frame
        if(!lit) {
           g.fillStyle = 'rgba(0,0,0,0.5)';
           drawOctagon(b.x, b.y, b.r); g.fill();
        }
    } else {
        g.fillStyle = lit ? '#ffffff' : '#181820'; g.fill();
        drawOctagon(b.x, b.y, b.r*0.5); 
        g.strokeStyle = lit ? '#000000' : '#444455'; g.stroke();
    }
    
    // Outer border outlines
    drawOctagon(b.x, b.y, b.r);
    g.strokeStyle = lit ? '#ffffff' : '#334455'; g.stroke();
    g.shadowBlur = 0;
  }

  g.lineWidth = 1;
  for(const r of ripples) {
      g.beginPath(); g.arc(r.x, r.y, r.r, 0, 7);
      g.globalAlpha = Math.max(0, r.life);
      g.strokeStyle = r.color; g.stroke();
      g.globalAlpha = 1.0;
  }

  for(const p of pops) {
    g.fillStyle = `rgba(255,255,255,${p.life})`;
    g.font = 'bold 16px monospace'; g.fillText(p.txt, p.x, p.y);
  }

  if(phase !== 'over' && phase !== 'start') {
    if(ball.trail && ball.trail.length > 0) {
      for(let i=0; i<ball.trail.length; i++) {
        const alpha = (ball.trail.length - i) / (ball.trail.length + 1) * (rageMode ? 0.6 : 0.3);
        g.beginPath(); g.arc(ball.trail[i].x, ball.trail[i].y, BR, 0, 7);
        g.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        g.fill();
      }
    }

    g.beginPath(); g.arc(ball.x, ball.y, BR, 0, 7);
    g.fillStyle = rageMode ? '#ffffff' : '#888888'; 
    if(rageMode) { g.shadowBlur = 15; g.shadowColor = '#ffffff'; }
    g.fill();
    g.shadowBlur = 0;
    
    const spd = Math.hypot(ball.vx, ball.vy);
    const eyeDist = Math.min(BR - 4, spd * 1.5);
    const eyeAng = Math.atan2(ball.vy, ball.vx);
    const ex = ball.x + Math.cos(eyeAng) * eyeDist;
    const ey = ball.y + Math.sin(eyeAng) * eyeDist;
    g.beginPath(); g.arc(ex, ey, 2.5, 0, 7);
    g.fillStyle = '#111'; g.fill();
  }

  for(const f of flippers) {
    g.save(); g.translate(f.px, f.py); g.rotate(f.angle);
    g.beginPath(); g.moveTo(-4,0); g.lineTo(0,-8); g.lineTo(f.len,-4); g.lineTo(f.len+4,0); g.lineTo(f.len,4); g.lineTo(0,8); g.closePath();
    const flash = f.hit > 0 || f.active;
    g.fillStyle = flash ? '#cccccc' : '#444444'; g.fill();
    g.strokeStyle = flash ? '#ffffff' : '#777777'; g.lineWidth = 2; g.stroke();
    g.restore();
  }

  // Draw Flying Voxels
  for(const p of parts) { 
      g.fillStyle = p.color || '#ffffff';
      g.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size); 
  }
  g.restore(); // END PLAYFIELD

  // DYNAMIC UI & HIGH-TECH UPGRADE
  if (logicalW > W + 200) {
    // Left Panel
    g.fillStyle = '#020304'; g.fillRect(0, 0, offsetX, logicalH);
    g.shadowBlur = 10; g.shadowColor = '#555555';
    g.strokeStyle = '#555555'; g.lineWidth = 1; 
    
    // Tech brackets
    g.beginPath(); 
    g.moveTo(40, 20); g.lineTo(20, 20); g.lineTo(20, logicalH-20); g.lineTo(40, logicalH-20);
    g.stroke();
    g.beginPath(); 
    g.moveTo(offsetX-40, 20); g.lineTo(offsetX-20, 20); g.lineTo(offsetX-20, logicalH-20); g.lineTo(offsetX-40, logicalH-20);
    g.stroke();
    g.shadowBlur = 0; g.lineWidth = 4;

    g.textAlign='center'; g.textBaseline='top';
    g.fillStyle='#aaaaaa'; g.font='12px monospace'; g.fillText('[ SYS.SCORE ]', offsetX/2, 60);
    g.fillStyle='#ffffff'; g.font='bold 34px monospace'; 
    g.shadowBlur = 10; g.shadowColor = '#ffffff';
    g.fillText(score.toString().padStart(7,'0'), offsetX/2, 85);
    g.shadowBlur = 0;
    
    g.fillStyle='#555555'; g.font='10px monospace'; g.fillText('--- [ METRICS ] ---', offsetX/2, 150);
    g.fillStyle='#aaaaaa'; g.font='12px monospace'; g.fillText('WEAPON DMG: '+ball.dmg.toFixed(0), offsetX/2, 175);
    g.fillStyle='#333333'; g.fillRect(offsetX/2 - 60, 195, 120, 4);
    g.fillStyle='#ffffff'; g.fillRect(offsetX/2 - 60, 195, Math.min(120, ball.dmg*2), 4);
    
    g.fillStyle='#ffffff'; 
    if(rageMode) { g.shadowBlur = 10; g.shadowColor = '#ffffff'; }
    g.fillText(rageMode ? '> RAGE ACTIVE <' : 'COMBO: '+Math.min(combo,5)+'/5', offsetX/2, 220);
    g.fillRect(offsetX/2 - 60, 240, Math.min((combo/5)*120, 120), 8);
    g.shadowBlur = 0;
    g.fillStyle='#333333'; g.fillRect(offsetX/2 - 60, 240, 120, 8);
    
    // Right Panel
    const rightX = offsetX + W;
    g.fillStyle = '#020304'; g.fillRect(rightX, 0, offsetX, logicalH);
    g.shadowBlur = 10; g.shadowColor = '#555555';
    g.strokeStyle = '#555555'; g.lineWidth = 1; 
    
    g.beginPath(); 
    g.moveTo(rightX+40, 20); g.lineTo(rightX+20, 20); g.lineTo(rightX+20, logicalH-20); g.lineTo(rightX+40, logicalH-20);
    g.stroke();
    g.beginPath(); 
    g.moveTo(rightX+offsetX-40, 20); g.lineTo(rightX+offsetX-20, 20); g.lineTo(rightX+offsetX-20, logicalH-20); g.lineTo(rightX+offsetX-40, logicalH-20);
    g.stroke();
    g.shadowBlur = 0; g.lineWidth = 4;

    g.fillStyle='#aaaaaa'; g.font='12px monospace'; g.fillText('[ SYS.LIVES ]', rightX + offsetX/2, 60);
    
    const boxW = 16, spacing = 12, tBoxesW = (3 * boxW) + (2 * spacing);
    let lStartX = rightX + (offsetX - tBoxesW)/2;
    for(let i=0; i<3; i++) {
      g.fillStyle = i < lives ? '#ffffff' : '#222222';
      if(i < lives) { g.shadowBlur = 10; g.shadowColor = '#ffffff'; }
      g.fillRect(lStartX + i*(boxW+spacing), 90, boxW, boxW);
      g.shadowBlur = 0;
    }
    
    g.fillStyle='#555555'; g.font='10px monospace'; g.fillText('--- [ STAGE ] ---', rightX + offsetX/2, 150);
    g.fillStyle='#ffffff'; g.font='bold 24px monospace'; 
    g.shadowBlur = 10; g.shadowColor = '#ffffff';
    g.fillText('FLOOR '+level, rightX + offsetX/2, 175);
    g.shadowBlur = 0;
    
    // Status text
    g.fillStyle='#444444'; g.font='10px monospace'; g.fillText('STATUS: ONLINE', rightX + offsetX/2, logicalH-40);
  } else {
    // Premium Mobile UI
    const uiHeight = 60;
    const uiTop = Math.max(0, offsetY - 50);
    const grad = g.createLinearGradient(0, uiTop, 0, uiTop + uiHeight);
    grad.addColorStop(0, '#010203'); grad.addColorStop(1, 'rgba(10,10,10,0.9)');
    g.fillStyle = grad;
    g.fillRect(0, uiTop, logicalW, uiHeight);
    
    g.shadowBlur = 10; g.shadowColor = '#ffffff';
    g.fillStyle = 'rgba(255,255,255,0.8)'; g.fillRect(0, uiTop + uiHeight - 2, logicalW, 2);
    g.shadowBlur = 0;
    
    g.textAlign='left'; g.textBaseline='middle';
    const uiY = uiTop + 28;
    g.fillStyle='#aaaaaa'; g.font='bold 12px monospace'; g.fillText('FLR', 10, uiY - 10);
    g.fillStyle='#ffffff'; g.font='bold 18px monospace'; g.fillText(level, 10, uiY + 6);
    
    g.fillStyle='#ffffff'; g.font='bold 24px monospace'; 
    g.shadowBlur = 10; g.shadowColor = '#ffffff';
    g.fillText(score.toString().padStart(7,'0'), 65, uiY);
    g.shadowBlur = 0;
    
    g.fillStyle='#333333'; g.fillRect(65, uiY + 12, 110, 4);
    g.fillStyle='#ffffff'; 
    if(rageMode) { g.shadowBlur = 10; g.shadowColor = '#ffffff'; }
    g.fillRect(65, uiY + 12, Math.min((combo/5)*110, 110), 4);
    g.shadowBlur = 0;
    
    g.textAlign='right'; 
    for(let i=0; i<3; i++) {
        g.fillStyle = i < lives ? '#ffffff' : '#222222';
        if(i<lives) { g.shadowBlur=10; g.shadowColor='#ffffff'; }
        g.fillRect(logicalW - 20 - i*16, uiY - 8, 12, 12);
        g.shadowBlur=0;
    }
  }

  // Enhanced CRT Scanlines & Vignette
  const scanTime = (Date.now() % 3000) / 3000;
  g.fillStyle = `rgba(0, 0, 0, 0.25)`;
  for(let sy=0; sy<logicalH; sy+=4) {
      g.fillRect(0, sy + (scanTime * 4), logicalW, 1 + logicalScale*0.5);
  }
  
  // Vignette Array Overlay
  const grd = g.createRadialGradient(logicalW/2, logicalH/2, logicalH*0.4, logicalW/2, logicalH/2, logicalH*0.8);
  grd.addColorStop(0, 'rgba(0,0,0,0)'); grd.addColorStop(1, 'rgba(0,0,0,0.65)');
  g.fillStyle = grd; g.fillRect(0, 0, logicalW, logicalH);

  // OVERLAYS
  const cx = logicalW / 2, cy = logicalH / 2;
  if(phase === 'start') {
    g.fillStyle = 'rgba(0,0,0,0.85)'; g.fillRect(0,0,logicalW,logicalH);
    g.fillStyle = '#fff'; g.textAlign = 'center'; g.textBaseline = 'middle';
    const tSize1 = logicalW < 400 ? 24 : 34; const tSize2 = logicalW < 400 ? 20 : 28;
    g.font = `bold ${tSize1}px monospace`; g.fillText('DATA CRAWLER: PINBALL', cx, cy-50);
    g.font = `${tSize2}px monospace`; g.fillText('BREAK THE PIXELS', cx, cy-10);
    const pulse = 0.5 + 0.5 * Math.sin(pulseT);
    g.fillStyle = `rgba(0,255,136,${pulse})`; 
    g.font = `bold 14px monospace`; g.fillText('TAP TO DEPLOY', cx, cy+60);
  } else if(phase === 'dead') {
    g.fillStyle = 'rgba(0,0,0,0.6)'; g.fillRect(0,0,logicalW,logicalH);
    g.fillStyle = '#ffffff'; g.textAlign = 'center'; g.textBaseline = 'middle';
    g.font = 'bold 18px monospace'; g.fillText('BALL LOST', cx, cy-15);
    g.fillStyle = '#aaaaaa'; g.font = '14px monospace'; g.fillText('LIVES REMAINING: ' + lives, cx, cy+15);
    g.fillStyle = '#ffffff'; g.font = '12px monospace';
    if(Date.now()%1000<500) g.fillText('> TAP TO LAUNCH <', cx, cy+45);
  } else if(phase === 'over') {
    g.fillStyle = 'rgba(0,0,0,0.85)'; g.fillRect(0,0,logicalW,logicalH);
    
    const bw = 300, bh = 210;
    const bx = cx - bw/2, by = cy - bh/2 - 20;
    g.strokeStyle = '#aaaaaa'; g.lineWidth = 2; g.strokeRect(bx, by, bw, bh);
    g.fillStyle = '#111111'; g.fillRect(bx, by, bw, bh);
    g.shadowBlur = 0;
    
    g.fillStyle = '#ffffff'; g.textAlign = 'center'; g.textBaseline = 'middle';
    const tSize1 = logicalW < 400 ? 28 : 36;
    g.font = `bold ${tSize1}px monospace`; g.fillText('SYSTEM FAILURE', cx, by+40);
    
    g.fillStyle = '#888888'; g.font = '16px monospace'; g.fillText('FINAL FLOOR: '+level, cx, by+85);
    g.fillStyle = '#aaaaaa'; g.font = '14px monospace'; g.fillText('TOTAL SCORE:', cx, by+115);
    
    g.fillStyle = '#ffffff'; g.font = 'bold 36px monospace'; 
    g.shadowBlur = 10; g.shadowColor = '#ffffff';
    g.fillText(score.toString().padStart(7,'0'), cx, by+145);
    g.shadowBlur = 0;
    
    g.fillStyle = '#ffffff'; g.font = '14px monospace';
    if(Date.now()%1000<500) g.fillText('> TAP TO REBOOT <', cx, by+190);
  }
}

function loop() { pulseT+=0.06; update(); draw(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);
</script>
</body>
</html>
